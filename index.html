<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Playground | Home</title>
    
    <style>
        :root {
            --primary: #0f4c81; 
            --primary-light: #1a5f99;
            --accent: #ef4444;
            --bg: #000000;
            --surface: #0a0f1a;
            --text: #e2e8f0;
            --border: #1e293b;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow-x: hidden;
        }

        /* Navigation Bar */
        header {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--primary);
            padding: 1rem; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .header-content { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1400px; margin: 0 auto; gap: 20px; 
        }
        
        .logo {
            font-size: 1.6rem; font-weight: 900;
            background: linear-gradient(90deg, var(--primary), #ffffff, var(--primary));
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: moveGradient 5s linear infinite;
            text-decoration: none;
            white-space: nowrap;
        }

        #searchBar {
            flex-grow: 1; max-width: 500px; padding: 12px 20px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); color: white; outline: none;
            transition: border-color 0.3s;
        }
        #searchBar:focus { border-color: var(--primary); }

        /* Game Grid */
        main { max-width: 1400px; margin: 0 auto; padding: 2rem; min-height: 85vh; }
        
        .game-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .game-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 15px; text-align: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        .game-card:hover {
            transform: translateY(-5px); 
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(15, 76, 129, 0.4);
            background: #111827;
        }
        .game-card span { 
            font-weight: 600; font-size: 0.75rem; color: #fff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%;
        }

        /* Overlays */
        .fullscreen-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column;
        }

        #gameViewer {
            position: fixed; inset: 0; background: #000; z-index: 5000;
            display: none; flex-direction: column;
        }
        .viewer-header { 
            background: #0a0a0a; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }

        /* Admin/Global Lock */
        #lockOverlay { display: none; background: #000; z-index: 10000; text-align: center; }
        #inGameAdminPanel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--surface); border: 2px solid var(--accent); padding: 25px;
            border-radius: var(--radius); width: 350px; z-index: 10001; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        @keyframes moveGradient { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        
        @media (max-width: 600px) {
            .header-content { flex-direction: column; }
            .game-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="joinOverlay" class="fullscreen-overlay">
        <div style="background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 90%; max-width: 400px;">
            <h1 class="logo" style="font-size: 2rem;">American Playground</h1>
            <p style="color: var(--text); margin-bottom: 25px;">Enter a nickname to begin</p>
            <input type="text" id="nameInput" placeholder="Username..." style="padding: 12px; width: 100%; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff;">
            <button onclick="joinSite()" style="padding: 12px; width: 100%; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; letter-spacing: 1px;">LAUNCH</button>
        </div>
    </div>

    <div id="lockOverlay" class="fullscreen-overlay">
        <h1 style="font-size: 4rem; margin: 0;">🔒</h1>
        <h1 style="color: white;">SITE LOCKED</h1>
        <p style="color: #666;">Maintenance in progress. Please check back later.</p>
    </div>

    <div id="inGameAdminPanel">
        <h2 style="color: var(--accent); margin: 0 0 15px 0; text-align: center; font-size: 1.2rem;">ADMIN CONSOLE</h2>
        <input type="password" id="adminPass" placeholder="Admin Key" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #333; background: #000; color: white;">
        
        <p style="font-size: 11px; color: #888; margin-bottom: 5px;">ACTIVE USERS (Click to target):</p>
        <ul id="playerListDisplay" style="background: #000; height: 120px; overflow-y: auto; margin: 0 0 15px 0; padding: 5px; border-radius: 5px; border: 1px solid #222; list-style: none;"></ul>

        <input type="text" id="targetId" placeholder="Target (all or ID)" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #333; background: #000; color: #fff;">
        <input type="text" id="adminCommandValue" placeholder="Message or URL..." style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #000; color: #fff;">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <button onclick="doAdmin('message')" style="background: var(--primary); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px;">Message</button>
            <button onclick="doAdmin('redirect')" style="background: #555; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px;">Redirect</button>
            <button onclick="doAdmin('lock')" style="background: #854d0e; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px;">Lock All</button>
            <button onclick="doAdmin('unlock')" style="background: #166534; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px;">Unlock All</button>
        </div>
        <button onclick="toggleAdmin()" style="width: 100%; margin-top: 15px; background: transparent; color: #666; border: none; cursor: pointer;">[ Close ]</button>
    </div>

    <div id="gameViewer">
        <div class="viewer-header">
            <button onclick="closeGame()" style="background: #222; color: white; border: 1px solid #444; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">BACK</button>
            <span id="nowPlaying" style="font-weight: 800; color: var(--primary);">GAME NAME</span>
            <button onclick="document.getElementById('gameIframe').requestFullscreen()" style="background: transparent; color: #aaa; border: none; cursor: pointer; font-size: 1.2rem;">⛶</button>
        </div>
        <iframe id="gameIframe" allowfullscreen="true"></iframe>
    </div>

    <header>
        <div class="header-content">
            <a href="#" class="logo">American Playground</a>
            <input type="text" id="searchBar" placeholder="Search the archives..." onkeyup="searchGames()">
            <div style="text-align: right;">
                <div id="userDisplay" style="font-weight: bold; font-size: 14px;">...</div>
                <div style="font-size: 10px; color: #555;">ID: <span id="idTag"></span></div>
            </div>
        </div>
    </header>

    <main>
        <div id="game-container" class="game-grid">
            </div>
    </main>

    <script>
        let ws;
        const user = {
            id: localStorage.getItem('ap_id') || Math.random().toString(36).substr(2, 9),
            name: localStorage.getItem('ap_name')
        };
        localStorage.setItem('ap_id', user.id);
        document.getElementById('idTag').textContent = user.id;

   // --- THE TARGETED ARCHIVE FETCHER ---
async function loadGames() {
    const container = document.getElementById('game-container');
    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--primary);">Scanning the Games Folders...</p>';

    // We added the specific 'path' so it ignores CSS, Emulators, etc.
    const sources = [
        { user: "HTML5GameArchive", repo: "gfiles", path: "games" },
        { user: "BinBashBanana", repo: "gfiles", path: "games" }
    ];

    try {
        const fetchPromises = sources.map(async (src) => {
            try {
                // Notice the URL now ends with /contents/${src.path}
                const res = await fetch(`https://api.github.com/repos/${src.user}/${src.repo}/contents/${src.path}`);
                if (!res.ok) return [];
                const data = await res.json();
                
                // We pass the path down so the iframe knows where to look
                return data.map(f => ({ ...f, srcUser: src.user, srcRepo: src.repo, srcPath: src.path }));
            } catch (e) {
                return []; 
            }
        });

        const results = await Promise.all(fetchPromises);
        
        let allFiles = [];
        results.forEach(repoFiles => { allFiles = allFiles.concat(repoFiles); });

        const uniqueGames = new Map();

        allFiles.forEach(file => {
            // Only pull actual folders, and ignore hidden system files
            if (file.type === 'dir' && !file.name.startsWith('.')) {
                const cleanName = file.name.replace(/-/g, ' ').replace(/_/g, ' ');
                const displayName = cleanName.toUpperCase();
                
                if (!uniqueGames.has(displayName)) {
                    uniqueGames.set(displayName, file);
                }
            }
        });

        container.innerHTML = '';
        const sortedNames = Array.from(uniqueGames.keys()).sort();

        sortedNames.forEach(gameName => {
            const file = uniqueGames.get(gameName);
            
            const card = document.createElement('div');
            card.className = 'game-card';
            card.setAttribute('data-name', gameName.toLowerCase());
            
            // The CDN link now correctly routes through the specific game folder
            const gameUrl = `https://cdn.statically.io/gh/${file.srcUser}/${file.srcRepo}/main/${file.srcPath}/${file.name}/index.html`;

            card.onclick = () => {
                document.getElementById('nowPlaying').textContent = gameName;
                document.getElementById('gameIframe').src = gameUrl;
                document.getElementById('gameViewer').style.display = 'flex';
            };

            card.innerHTML = `
                <div style="font-size: 35px; margin-bottom: 10px; background: #111; width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #333;">🕹️</div>
                <span>${gameName}</span>
            `;
            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red;">Failed to reach the archives. Check your connection or GitHub API limits.</p>';
    }
}
        // --- WEB SOCKETS & ADMIN CONTROLS ---
        function connectWS() {
            // Replace with your Render URL
            ws = new WebSocket('wss://amplr.onrender.com'); 
            
            ws.onopen = () => ws.send(JSON.stringify({ type: 'join', user: user }));
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'userListUpdate') updateAdminPlayerList(data.users);
                if (data.type === 'serverAction') {
                    if (data.targetId !== 'all' && data.targetId !== user.id) return;
                    
                    if (data.action === 'lock') document.getElementById('lockOverlay').style.display = 'flex';
                    if (data.action === 'unlock') document.getElementById('lockOverlay').style.display = 'none';
                    if (data.action === 'message') alert("ADMIN MESSAGE: " + data.payload);
                    if (data.action === 'redirect') window.location.href = data.payload;
                }
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        function updateAdminPlayerList(users) {
            const list = document.getElementById('playerListDisplay');
            list.innerHTML = '';
            for (let id in users) {
                const li = document.createElement('li');
                li.style.cssText = "padding: 5px; cursor: pointer; border-bottom: 1px solid #111; font-size: 12px;";
                li.textContent = `${users[id]} [${id}]`;
                li.onclick = () => document.getElementById('targetId').value = id;
                list.appendChild(li);
            }
        }

        function joinSite() {
            const nameInput = document.getElementById('nameInput');
            const name = nameInput.value.trim();
            
            if (name) {
                user.name = name;
                localStorage.setItem('ap_name', name);
                document.getElementById('joinOverlay').style.display = 'none';
                document.getElementById('userDisplay').textContent = name;
                connectWS();
                loadGames();
            } else {
                nameInput.style.border = "2px solid red";
                nameInput.placeholder = "Please enter a name first!";
            }
        }

        function closeGame() {
            document.getElementById('gameIframe').src = '';
            document.getElementById('gameViewer').style.display = 'none';
        }

        function searchGames() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(card => {
                card.style.display = card.getAttribute('data-name').includes(q) ? 'flex' : 'none';
            });
        }

        function toggleAdmin() {
            const p = document.getElementById('inGameAdminPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function doAdmin(action) {
            ws.send(JSON.stringify({
                type: 'adminCommand',
                password: document.getElementById('adminPass').value,
                action: action,
                targetId: document.getElementById('targetId').value || 'all',
                payload: document.getElementById('adminCommandValue').value
            }));
        }

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'a') toggleAdmin();
        });

        if (user.name) {
            document.getElementById('joinOverlay').style.display = 'none';
            document.getElementById('userDisplay').textContent = user.name;
            connectWS();
            loadGames();
        }
    </script>
</body>
</html>
