<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Playground</title>
    <link rel="stylesheet" href="scripts/style.css">
    
    <style>
        :root {
            --primary-color: #0f4c81; 
            --primary-hover: #1e3a8a; 
            --text-color: #e2e8f0;
            --background-color: #000000; 
            --card-bg: #0a0f1a; 
            --card-border: #1e293b;
            --danger-color: #ef4444;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        header { 
            background-color: var(--background-color); border-bottom: 2px solid var(--primary-color); 
            padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; 
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); cursor: pointer; user-select: none; }
        
        main { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; min-height: 70vh; }

        .game-box {
            background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px;
            padding: 40px 10px; text-align: center; cursor: pointer; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .game-box:hover { transform: scale(1.05); border-color: var(--primary-color); background: #111a2e; }
        .game-box span { font-size: 1.2rem; font-weight: bold; color: var(--text-color); }

        /* Overlays */
        .fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column;
        }

        .prompt-box {
            background-color: var(--card-bg); border: 2px solid var(--primary-color);
            padding: 2rem; border-radius: 10px; text-align: center;
        }
        .prompt-box input {
            padding: 10px; width: 80%; margin: 15px 0; background: #000; 
            border: 1px solid var(--primary-color); color: white; border-radius: 5px;
        }

        /* Admin Panel */
        #inGameAdminPanel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); border: 2px solid var(--danger-color); padding: 20px;
            border-radius: 10px; width: 320px; z-index: 10001; box-shadow: 0 0 30px rgba(239,68,68,0.3);
        }
        #playerListDisplay { 
            background: #000; border: 1px solid #333; height: 100px; overflow-y: auto; 
            margin: 10px 0; padding: 5px; font-size: 12px; color: #aaa; list-style: none;
        }
        #playerListDisplay li { padding: 4px; border-bottom: 1px solid #222; cursor: pointer; }
        #playerListDisplay li:hover { background: #222; color: #fff; }

        #gamePlayerOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--background-color); z-index: 5000;
            display: none; flex-direction: column;
        }
        .player-header {
            background-color: var(--card-bg); border-bottom: 2px solid var(--primary-color);
            padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
        }
        #gameIframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #000; }

        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 10002; }
        .toast { background: var(--primary-color); color: white; padding: 12px; border-radius: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="namePromptOverlay" class="fullscreen-overlay">
        <div class="prompt-box">
            <h2>Welcome to American Playground</h2>
            <input type="text" id="userNameInput" placeholder="Enter your name...">
            <br>
            <button onclick="saveName()" style="padding: 10px 20px; cursor: pointer; background: var(--primary-color); color: white; border: none; border-radius: 5px;">Let's Play</button>
        </div>
    </div>

    <div id="lockScreenOverlay" class="fullscreen-overlay" style="display: none;">
        <h1 style="color: white;">🔒 Site Locked</h1>
        <p style="color: #888;">Access has been temporarily restricted by an administrator.</p>
    </div>

    <div id="inGameAdminPanel">
        <h3 style="color: var(--danger-color); text-align: center; margin-top: 0;">Admin Command Center</h3>
        <input type="password" id="adminSecretPass" placeholder="Admin Password" style="width:100%; padding:8px; box-sizing:border-box;">
        
        <p style="font-size: 10px; margin: 10px 0 2px 0; color: #888;">ONLINE USERS (Click to target):</p>
        <ul id="playerListDisplay"></ul>

        <input type="text" id="targetUserId" placeholder="Target ID (or 'all')" style="width:100%; padding:5px; margin-bottom:5px;">
        <input type="text" id="adminMsgText" placeholder="Broadcast message..." style="width:100%; padding:5px;">
        <button onclick="sendAdminCommand('message')" style="width:100%; margin:5px 0; background: var(--danger-color); color: white; border:none; padding:8px; cursor:pointer;">Send Message</button>
        
        <input type="text" id="adminUrlText" placeholder="Redirect URL..." style="width:100%; padding:5px;">
        <button onclick="sendAdminCommand('redirect')" style="width:100%; margin:5px 0; background: var(--danger-color); color: white; border:none; padding:8px; cursor:pointer;">Force Redirect</button>

        <div style="display: flex; gap: 5px;">
            <button onclick="sendAdminCommand('lock')" style="flex:1; background: #eab308; padding:8px; cursor:pointer; border:none;">Lock All</button>
            <button onclick="sendAdminCommand('unlock')" style="flex:1; background: var(--primary-color); color:white; padding:8px; cursor:pointer; border:none;">Unlock All</button>
        </div>
        <button onclick="toggleAdminPanel()" style="width:100%; margin-top:10px; padding:5px; cursor:pointer;">Close</button>
    </div>

    <div id="gamePlayerOverlay">
        <div class="player-header">
            <button onclick="closeGame()" style="background:var(--primary-color); color:white; border:none; padding:8px 15px; cursor:pointer; border-radius:5px;">⬅ Back</button>
            <h3 id="playingTitle" style="margin: 0; color: white;">Playing...</h3>
            <div style="width: 50px;"></div>
        </div>
        <iframe id="gameIframe" src=""></iframe>
    </div>

    <div id="toastContainer"></div>

    <header>
        <div class="header-content">
            <div class="logo">American Playground</div>
            <div style="color: #888; font-size: 14px;">User: <span id="displayUserName" style="color:white;">Player</span></div>
        </div>
    </header>

    <main>
        <div id="game-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;">
            </div>
    </main>

    <script>
        let ws;
        let currentUser = {
            id: localStorage.getItem('userId') || Math.random().toString(36).substr(2, 9),
            name: localStorage.getItem('userName')
        };
        localStorage.setItem('userId', currentUser.id);

        // --- GAME LOADING LOGIC ---
        async function loadGamesFromGitHub() {
            try {
                const response = await fetch(`https://api.github.com/repos/APGCxnnxr/APGCxnnxr.github.io/contents/games`);
                const files = await response.json();
                const container = document.getElementById("game-container");
                container.innerHTML = "";

                files.filter(f => f.name.endsWith('.html')).forEach(file => {
                    const title = file.name.replace('.html', '').replace(/[-_]/g, ' ');
                    const gameBox = document.createElement("div");
                    gameBox.className = "game-box";
                    
                    // FIX: We use the full URL so the Launcher doesn't get blocked
                    const absoluteLink = "https://apgcxnnxr.github.io/" + file.path;
                    
                    gameBox.onclick = () => openGame(absoluteLink, title);
                    gameBox.innerHTML = `<span>${title.toUpperCase()}</span>`;
                    container.appendChild(gameBox);
                });
            } catch (e) { console.error("GitHub Load Error:", e); }
        }

        function openGame(link, title) {
            document.getElementById('playingTitle').textContent = "Playing: " + title;
            document.getElementById('gameIframe').src = link;
            document.getElementById('gamePlayerOverlay').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gameIframe').src = "";
            document.getElementById('gamePlayerOverlay').style.display = 'none';
        }

        // --- WEB SOCKET LOGIC ---
        function connect() {
            ws = new WebSocket('wss://amplr.onrender.com');
            
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'join', user: currentUser }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                
                if (data.type === 'userListUpdate') {
                    updatePlayerListUI(data.users);
                } else if (data.type === 'serverAction') {
                    handleAction(data);
                }
            };

            ws.onclose = () => setTimeout(connect, 3000);
        }

        function handleAction(data) {
            if (data.targetId !== 'all' && data.targetId !== currentUser.id) return;

            switch (data.action) {
                case 'lock': document.getElementById('lockScreenOverlay').style.display = 'flex'; break;
                case 'unlock': document.getElementById('lockScreenOverlay').style.display = 'none'; break;
                case 'message': showToast(data.payload); break;
                case 'redirect': window.location.href = data.payload; break;
            }
        }

        function updatePlayerListUI(users) {
            const list = document.getElementById('playerListDisplay');
            list.innerHTML = '';
            for (let id in users) {
                const li = document.createElement('li');
                li.textContent = `${users[id]} (${id})`;
                li.onclick = () => {
                    document.getElementById('targetUserId').value = id;
                    showToast(`Target set to ${users[id]}`);
                };
                list.appendChild(li);
            }
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function saveName() {
            const input = document.getElementById('userNameInput').value.trim();
            if (input) {
                currentUser.name = input;
                localStorage.setItem('userName', input);
                document.getElementById('namePromptOverlay').style.display = 'none';
                document.getElementById('displayUserName').textContent = input;
                initApp();
            }
        }

        function initApp() {
            connect();
            loadGamesFromGitHub();
        }

        // Admin Keybind
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'a') toggleAdminPanel();
        });

        function toggleAdminPanel() {
            const p = document.getElementById('inGameAdminPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function sendAdminCommand(action) {
            const pass = document.getElementById('adminSecretPass').value;
            const target = document.getElementById('targetUserId').value || 'all';
            let payload = "";
            if(action === 'message') payload = document.getElementById('adminMsgText').value;
            if(action === 'redirect') payload = document.getElementById('adminUrlText').value;

            ws.send(JSON.stringify({
                type: 'adminCommand',
                password: pass,
                action: action,
                targetId: target,
                payload: payload
            }));
        }

        // Auto-login
        if (currentUser.name) {
            document.getElementById('namePromptOverlay').style.display = 'none';
            document.getElementById('displayUserName').textContent = currentUser.name;
            initApp();
        }
    </script>
</body>
</html>
