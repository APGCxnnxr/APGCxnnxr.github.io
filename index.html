<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Playground ( Rip-off )</title>
    
    <style>
        :root {
            --primary-color: #0f4c81; 
            --primary-hover: #1e3a8a; 
            --text-color: #e2e8f0;
            --background-color: #000000; 
            --card-bg: #0a0f1a; 
            --card-border: #1e293b;
            --shadow: rgba(0, 0, 0, 0.8);
            --popup-bg: #0a0f1a;
            --danger-color: #ef4444;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Header & Layout Styles --- */
        header { 
            background-color: var(--background-color); 
            border-bottom: 2px solid var(--primary-color); 
            padding: 1rem; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        
        .header-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: var(--primary-color); 
            cursor: pointer; /* Added so it feels clickable */
            user-select: none; /* Prevents text highlighting when tapping fast */
        }
        
        main { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 2rem 1rem; 
            min-height: 70vh; 
        }
        
        #container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
        }

        /* --- Name Prompt & Lock Screen Overlays --- */
        .fullscreen-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
        }

        .prompt-box {
            background-color: var(--card-bg);
            border: 2px solid var(--primary-color);
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(15, 76, 129, 0.5);
        }

        .prompt-box input {
            padding: 10px;
            width: 80%;
            margin: 15px 0;
            background: var(--background-color);
            border: 1px solid var(--primary-color);
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }

        .prompt-box button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Admin UI --- */
        #adminPanel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background-color: var(--card-bg);
            border: 2px solid var(--danger-color);
            border-radius: 10px;
            padding: 15px;
            z-index: 9000;
            display: none;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        #adminPanel h3 { margin-top: 0; color: var(--danger-color); border-bottom: 1px solid var(--card-border); padding-bottom: 10px;}
        .admin-control { margin-bottom: 15px; }
        .admin-control select, .admin-control input { width: 100%; padding: 8px; margin-top: 5px; background: #000; color: white; border: 1px solid var(--card-border); box-sizing: border-box; }
        .admin-btn { display: inline-block; width: 48%; padding: 8px; background: var(--card-border); color: white; border: none; cursor: pointer; margin-top: 5px; text-align: center; box-sizing: border-box;}
        .admin-btn:hover { background: var(--primary-color); }
        .admin-btn.danger { background: var(--danger-color); }
        
        #toastContainer {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
        }
        .toast {
            background: var(--primary-color); color: white; padding: 15px 20px; border-radius: 5px;
            margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="namePromptOverlay" class="fullscreen-overlay" style="display: none;">
        <div class="prompt-box">
            <h2>Welcome to American Playground</h2>
            <p>What should we call you?</p>
            <input type="text" id="userNameInput" placeholder="Enter your first name...">
            <br>
            <button onclick="saveName()">Let's Play</button>
        </div>
    </div>

    <div id="lockScreenOverlay" class="fullscreen-overlay" style="display: none;">
        <div style="text-align: center;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h1 style="color: white; margin-top: 20px;">Site Locked</h1>
            <p style="color: #888;">An administrator has temporarily locked your access.</p>
        </div>
    </div>

    <div id="adminPanel">
        <h3>Admin Console ⚡</h3>
        <div class="admin-control">
            <label>Select User:</label>
            <select id="adminUserSelect">
                <option value="all">Everyone</option>
                </select>
        </div>
        <div class="admin-control" style="display: flex; justify-content: space-between;">
            <button class="admin-btn danger" onclick="adminAction('lock')">Lock</button>
            <button class="admin-btn" onclick="adminAction('unlock')">Unlock</button>
        </div>
        <div class="admin-control">
            <input type="text" id="adminMsgInput" placeholder="Message text...">
            <button class="admin-btn" style="width: 100%;" onclick="adminAction('message')">Send Message</button>
        </div>
        <div class="admin-control">
            <input type="text" id="adminUrlInput" placeholder="https://google.com">
            <button class="admin-btn danger" style="width: 100%;" onclick="adminAction('redirect')">Force Redirect</button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <header>
        <div class="header-content">
            <div class="logo">American Playground ( Rip-off )</div>
            <div style="color: #888; font-size: 14px;">Welcome, <span id="displayUserName">Player</span></div>
        </div>
    </header>

    <main>
        <div id="container">
            </div>
    </main>

    <script>
        // --- 1. User Identification & Name Logic ---
        let currentUser = {
            id: localStorage.getItem('userId') || generateId(),
            name: localStorage.getItem('userName'),
            isAdmin: localStorage.getItem('isAdmin') === 'true'
        };

        function generateId() {
            const id = Math.random().toString(36).substr(2, 9);
            localStorage.setItem('userId', id);
            return id;
        }

        function checkName() {
            if (!currentUser.name) {
                document.getElementById('namePromptOverlay').style.display = 'flex';
            } else {
                document.getElementById('displayUserName').textContent = currentUser.name;
                initApp(); 
            }
        }

        function saveName() {
            const input = document.getElementById('userNameInput').value.trim();
            if (input.length > 0) {
                localStorage.setItem('userName', input);
                currentUser.name = input;
                document.getElementById('namePromptOverlay').style.display = 'none';
                document.getElementById('displayUserName').textContent = currentUser.name;
                initApp();
            }
        }

        // --- 2. WebSocket Logic ---
        let ws;
        
        function initApp() {
            checkAdmin();
            connectWebSocket();
            // Call your listZones() function here to load games if you have it
        }

        function connectWebSocket() {
            // REPLACE THIS URL with your actual backend server URL once you build it.
            const wsUrl = 'wss://amplr.onrender.com'; 
            
            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('Connected to Server');
                    ws.send(JSON.stringify({
                        type: 'join',
                        user: currentUser
                    }));
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleServerCommand(data);
                };

                ws.onclose = () => {
                    console.log('Disconnected. Retrying in 5s...');
                    setTimeout(connectWebSocket, 5000);
                };
            } catch (e) {
                console.warn("WebSocket failed to connect. Ensure you have a backend server running.");
            }
        }

        // --- 3. Client Reaction Logic ---
        function handleServerCommand(data) {
            if (data.targetId && data.targetId !== 'all' && data.targetId !== currentUser.id) return;

            switch (data.action) {
                case 'lock':
                    document.getElementById('lockScreenOverlay').style.display = 'flex';
                    break;
                case 'unlock':
                    document.getElementById('lockScreenOverlay').style.display = 'none';
                    break;
                case 'message':
                    showToast(data.payload);
                    break;
                case 'redirect':
                    window.location.href = data.payload;
                    break;
                case 'userListUpdate':
                    if (currentUser.isAdmin) updateUserDropdown(data.payload);
                    break;
            }
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        // --- 4. Admin UI Logic ---
        function checkAdmin() {
            if (currentUser.isAdmin) {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        function updateUserDropdown(users) {
            const select = document.getElementById('adminUserSelect');
            select.innerHTML = '<option value="all">Everyone</option>';
            users.forEach(u => {
                if (u.id !== currentUser.id) { 
                    const opt = document.createElement('option');
                    opt.value = u.id;
                    opt.textContent = `${u.name} (${u.id})`;
                    select.appendChild(opt);
                }
            });
        }

        function adminAction(actionType) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert("Not connected to server!");
                return;
            }

            const targetId = document.getElementById('adminUserSelect').value;
            let payload = '';

            if (actionType === 'message') payload = document.getElementById('adminMsgInput').value;
            if (actionType === 'redirect') payload = document.getElementById('adminUrlInput').value;

            const command = {
                type: 'adminCommand',
                action: actionType,
                targetId: targetId,
                payload: payload
            };

            ws.send(JSON.stringify(command));
            
            document.getElementById('adminMsgInput').value = '';
            document.getElementById('adminUrlInput').value = '';
        }

        // --- 5. Secret Admin Backdoor ---
        let logoClickCount = 0;
        let clickTimer;

        function setupAdminBackdoor() {
            const logo = document.querySelector('.logo');
            
            logo.addEventListener('click', () => {
                logoClickCount++;
                
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);

                if (logoClickCount === 5) {
                    localStorage.setItem('isAdmin', 'true');
                    currentUser.isAdmin = true;
                    checkAdmin(); 
                    showToast("Admin mode unlocked! ⚡");
                    logoClickCount = 0; 
                }
            });
        }

        // Boot sequence
        document.addEventListener('DOMContentLoaded', () => {
            checkName();
            setupAdminBackdoor();
        });
    </script>
</body>
</html>
