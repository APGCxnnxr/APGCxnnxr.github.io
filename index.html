<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Playground </title>
    
    <link rel="stylesheet" href="scripts/style.css">
    
    <style>
        :root {
            --primary-color: #0f4c81; 
            --primary-hover: #1e3a8a; 
            --text-color: #e2e8f0;
            --background-color: #000000; 
            --card-bg: #0a0f1a; 
            --card-border: #1e293b;
            --danger-color: #ef4444;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        header { 
            background-color: var(--background-color); border-bottom: 2px solid var(--primary-color); 
            padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; 
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); cursor: pointer; user-select: none; }
        .navbar { margin-top: 10px; }
        .navbar a { color: var(--text-color); margin-right: 15px; text-decoration: none; cursor: pointer; }
        .navbar a:hover { color: var(--primary-color); }
        
        main { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; min-height: 70vh; }

        /* Modified Game Box for text-only display */
        .game-box {
            background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px;
            padding: 40px 10px; text-align: center; cursor: pointer; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .game-box:hover { transform: scale(1.05); border-color: var(--primary-color); background: #111a2e; }
        .game-box span { font-size: 1.2rem; font-weight: bold; color: var(--text-color); }

        .fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column;
        }

        .prompt-box {
            background-color: var(--card-bg); border: 2px solid var(--primary-color);
            padding: 2rem; border-radius: 10px; text-align: center;
            box-shadow: 0 10px 30px rgba(15, 76, 129, 0.5);
        }
        .prompt-box input {
            padding: 10px; width: 80%; margin: 15px 0; background: var(--background-color); 
            border: 1px solid var(--primary-color); color: white; border-radius: 5px; font-size: 16px;
        }
        .prompt-box button {
            background: var(--primary-color); color: white; border: none; padding: 10px 20px; 
            font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        #gamePlayerOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--background-color); z-index: 5000;
            display: none; flex-direction: column;
        }
        .player-header {
            background-color: var(--card-bg); border-bottom: 2px solid var(--primary-color);
            padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
        }
        .player-header button {
            background: var(--primary-color); color: white; border: none; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .player-header button:hover { background: var(--primary-hover); }
        #gameIframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #000; }
        
        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .toast {
            background: var(--primary-color); color: white; padding: 15px 20px; border-radius: 5px;
            margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="namePromptOverlay" class="fullscreen-overlay">
        <div class="prompt-box">
            <h2>Welcome to American Playground</h2>
            <p>What should we call you?</p>
            <input type="text" id="userNameInput" placeholder="Enter your first name...">
            <br>
            <button onclick="saveName()">Let's Play</button>
        </div>
    </div>

    <div id="lockScreenOverlay" class="fullscreen-overlay" style="display: none;">
        <div style="text-align: center;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h1 style="color: white; margin-top: 20px;">Site Locked</h1>
            <p style="color: #888;">An administrator has temporarily locked your access.</p>
        </div>
    </div>

    <div id="gamePlayerOverlay">
        <div class="player-header">
            <button onclick="closeGame()">⬅ Back to Games</button>
            <h3 id="playingTitle" style="margin: 0; color: white;">Playing...</h3>
            <div style="width: 100px;"></div>
        </div>
        <iframe id="gameIframe" src=""></iframe>
    </div>

    <div id="toastContainer"></div>

    <header>
        <div class="header-content">
            <div>
                <div class="logo">American Playground ( Rip-off )</div>
                <div class="navbar">
                    <a onclick="closeGame()">Home</a>
                </div>
            </div>
            <div style="color: #888; font-size: 14px;">Welcome, <span id="displayUserName">Player</span></div>
        </div>
    </header>

    <main>
        <h4>Only Doom, The Final Earth 2, Tower Wizard, Undertale, Universal Paperclips, and Wordle work :(</h4>
        
        <div id="tags-container" style="margin-bottom: 20px;"></div>
        <div id="game-container" class="games-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;"></div>
    </main>

    <script src="scripts/main.js"></script>
    <script>
        // --- User Logic ---
        let currentUser = {
            id: localStorage.getItem('userId') || generateId(),
            name: localStorage.getItem('userName')
        };

        function generateId() {
            const id = Math.random().toString(36).substr(2, 9);
            localStorage.setItem('userId', id);
            return id;
        }

        function checkName() {
            if (currentUser.name) {
                document.getElementById('namePromptOverlay').style.display = 'none';
                document.getElementById('displayUserName').textContent = currentUser.name;
                initApp(); 
            }
        }

        function saveName() {
            const input = document.getElementById('userNameInput').value.trim();
            if (input.length > 0) {
                localStorage.setItem('userName', input);
                currentUser.name = input;
                document.getElementById('namePromptOverlay').style.display = 'none';
                document.getElementById('displayUserName').textContent = currentUser.name;
                initApp();
            }
        }

        function initApp() {
            connectWebSocket();
            loadGamesFromGitHub(); 
        }

        // --- GitHub API Game Loader ---
        let allGames = [];

        async function loadGamesFromGitHub() {
            try {
                const githubUsername = "APGCxnnxr"; 
                const repositoryName = "APGCxnnxr.github.io";
                const folderName = "games"; 

                const apiUrl = `https://api.github.com/repos/${githubUsername}/${repositoryName}/contents/${folderName}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Could not fetch folder contents from GitHub.");
                
                const files = await response.json();
                
                // Only grab .html files
                const htmlFiles = files.filter(file => file.name.endsWith('.html'));

                allGames = htmlFiles.map(file => {
                    let rawName = file.name.replace('.html', '');
                    let cleanTitle = rawName.replace(/[-_]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

                    return {
                        title: cleanTitle,
                        link: file.path // This will be "games/filename.html"
                    };
                });

                renderGames();

            } catch (error) {
                console.error("Failed to load games from GitHub:", error);
                document.getElementById('game-container').innerHTML = "<p style='color:red;'>Failed to read games folder from GitHub. Make sure you have a folder named 'games' with your HTML files inside!</p>";
            }
        }

        function renderGames() {
            const container = document.getElementById("game-container");
            container.innerHTML = "";
            
            allGames.forEach(game => {
                const gameBox = document.createElement("div");
                gameBox.className = "game-box";
                gameBox.onclick = () => openGame(game.link, game.title);
                gameBox.innerHTML = `<span>${game.title}</span>`;
                container.appendChild(gameBox);
            });
        }

        function openGame(link, title) {
            document.getElementById('playingTitle').textContent = "Playing: " + title;
            document.getElementById('gameIframe').src = link;
            document.getElementById('gamePlayerOverlay').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gameIframe').src = ""; 
            document.getElementById('gamePlayerOverlay').style.display = 'none';
        }

        // --- WebSocket Logic ---
        let ws;
        function connectWebSocket() {
            const wsUrl = 'wss://amplr.gorender.com'; 
            try {
                ws = new WebSocket(wsUrl);
                ws.onopen = () => {
                    console.log('Connected to Server');
                    ws.send(JSON.stringify({ type: 'join', user: currentUser }));
                };
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleServerCommand(data);
                };
                ws.onclose = () => {
                    setTimeout(connectWebSocket, 5000);
                };
            } catch (e) {
                console.warn("WebSocket failed to connect.");
            }
        }

        function handleServerCommand(data) {
            // Ignore commands not meant for us
            if (data.targetId && data.targetId !== 'all' && data.targetId !== currentUser.id) return;

            switch (data.action) {
                case 'lock': document.getElementById('lockScreenOverlay').style.display = 'flex'; break;
                case 'unlock': document.getElementById('lockScreenOverlay').style.display = 'none'; break;
                case 'message': showToast(data.payload); break;
                case 'redirect': window.location.href = data.payload; break;
            }
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkName();
        });
    </script>
</body>
</html>
