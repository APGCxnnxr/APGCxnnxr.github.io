<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Playground</title>
    <link rel="stylesheet" href="scripts/style.css">
    
    <style>
        :root {
            --primary-color: #0f4c81; 
            --text-color: #e2e8f0;
            --background-color: #000000; 
            --card-bg: #0a0f1a; 
            --danger-color: #ef4444;
        }

        body { background-color: var(--background-color); color: var(--text-color); font-family: sans-serif; margin: 0; overflow-x: hidden; }
        header { border-bottom: 2px solid var(--primary-color); padding: 1rem; text-align: center; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        /* Overlays */
        .fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .prompt-box { background: var(--card-bg); border: 2px solid var(--primary-color); padding: 2rem; border-radius: 10px; text-align: center; }
        .prompt-box input { padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid var(--primary-color); background: #000; color: #fff; }

        /* Admin Panel Styles */
        #inGameAdminPanel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); border: 2px solid var(--danger-color); padding: 20px;
            border-radius: 10px; width: 320px; z-index: 10001; box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }
        #playerListDisplay { 
            background: #000; border: 1px solid #333; height: 100px; overflow-y: auto; 
            margin: 10px 0; padding: 5px; font-size: 12px; color: #aaa; list-style: none;
        }
        #playerListDisplay li:hover { color: #fff; background: #222; cursor: pointer; }
        
        .admin-btn { width: 100%; padding: 8px; margin-top: 5px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-red { background: var(--danger-color); color: white; }
        .btn-gold { background: #eab308; color: black; }

        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 10002; }
        .toast { background: var(--primary-color); color: white; padding: 12px; border-radius: 5px; margin-bottom: 5px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="namePromptOverlay" class="fullscreen-overlay">
        <div class="prompt-box">
            <h2>American Playground</h2>
            <input type="text" id="userNameInput" placeholder="Enter Nickname...">
            <button onclick="saveName()" style="padding: 10px 20px; cursor: pointer;">Join</button>
        </div>
    </div>

    <div id="lockScreenOverlay" class="fullscreen-overlay" style="display: none;">
        <h1>🔒 Site Locked</h1>
        <p>Admin has paused the playground.</p>
    </div>

    <div id="inGameAdminPanel">
        <h3 style="color: var(--danger-color); margin: 0 0 10px 0; text-align: center;">ADMIN CONSOLE</h3>
        <input type="password" id="adminSecretPass" placeholder="Admin Password" style="width: 100%; padding: 8px; box-sizing: border-box;">
        
        <p style="font-size: 10px; margin: 10px 0 0 0;">ONLINE PLAYERS (Click to target):</p>
        <ul id="playerListDisplay"></ul>

        <input type="text" id="targetUserId" placeholder="Target ID (or 'all')" style="width: 100%; padding: 5px; box-sizing: border-box; margin-bottom: 5px;">
        <input type="text" id="adminMsgText" placeholder="Message..." style="width: 100%; padding: 5px; box-sizing: border-box;">
        <button class="admin-btn btn-red" onclick="sendAdminCommand('message')">Send Message</button>
        
        <input type="text" id="adminUrlText" placeholder="Redirect URL..." style="width: 100%; padding: 5px; box-sizing: border-box; margin-top: 5px;">
        <button class="admin-btn btn-red" onclick="sendAdminCommand('redirect')">Force Redirect</button>

        <div style="display: flex; gap: 5px;">
            <button class="admin-btn btn-gold" onclick="sendAdminCommand('lock')">Lock</button>
            <button class="admin-btn btn-gold" style="background: #0f4c81; color: white;" onclick="sendAdminCommand('unlock')">Unlock</button>
        </div>
        <button onclick="toggleAdminPanel()" style="width: 100%; margin-top: 10px; background: #333; color: white; border: none; padding: 5px; cursor: pointer;">Close</button>
    </div>

    <div id="toastContainer"></div>

    <header>
        <div class="header-content">
            <div style="font-size: 1.2rem; font-weight: bold; color: var(--primary-color);">Playground Alpha</div>
            <div>User: <span id="displayUserName" style="color: #fff;">...</span></div>
        </div>
    </header>

    <main>
        <div id="game-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;">
            </div>
    </main>

    <script>
        let ws;
        let currentUser = {
            id: localStorage.getItem('userId') || Math.random().toString(36).substr(2, 9),
            name: localStorage.getItem('userName')
        };
        localStorage.setItem('userId', currentUser.id);

        function saveName() {
            const val = document.getElementById('userNameInput').value.trim();
            if (val) {
                currentUser.name = val;
                localStorage.setItem('userName', val);
                document.getElementById('namePromptOverlay').style.display = 'none';
                document.getElementById('displayUserName').textContent = val;
                connect();
            }
        }

        function connect() {
            ws = new WebSocket('wss://amplr.onrender.com');
            ws.onopen = () => ws.send(JSON.stringify({ type: 'join', user: currentUser }));
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                
                if (data.type === 'userListUpdate') {
                    updateListUI(data.users);
                } else if (data.type === 'serverAction') {
                    handleAction(data);
                }
            };
            ws.onclose = () => setTimeout(connect, 3000);
        }

        function updateListUI(users) {
            const list = document.getElementById('playerListDisplay');
            list.innerHTML = '';
            for (let id in users) {
                const li = document.createElement('li');
                li.textContent = `${users[id]} (${id})`;
                li.onclick = () => document.getElementById('targetUserId').value = id;
                list.appendChild(li);
            }
        }

        function handleAction(data) {
            switch (data.action) {
                case 'message': showToast(data.payload); break;
                case 'lock': document.getElementById('lockScreenOverlay').style.display = 'flex'; break;
                case 'unlock': document.getElementById('lockScreenOverlay').style.display = 'none'; break;
                case 'redirect': window.location.href = data.payload; break;
            }
        }

        function showToast(msg) {
            const div = document.createElement('div');
            div.className = 'toast';
            div.textContent = msg;
            document.getElementById('toastContainer').appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        // Admin Toggle
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'a') toggleAdminPanel();
        });

        function toggleAdminPanel() {
            const p = document.getElementById('inGameAdminPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function sendAdminCommand(action) {
            const pass = document.getElementById('adminSecretPass').value;
            const target = document.getElementById('targetUserId').value || 'all';
            let payload = (action === 'message') ? document.getElementById('adminMsgText').value : document.getElementById('adminUrlText').value;

            ws.send(JSON.stringify({
                type: 'adminCommand',
                password: pass,
                action: action,
                targetId: target,
                payload: payload
            }));
        }

        if (currentUser.name) {
            document.getElementById('namePromptOverlay').style.display = 'none';
            document.getElementById('displayUserName').textContent = currentUser.name;
            connect();
        }
    </script>
</body>
</html>
